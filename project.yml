name: LotoReport
options:
  bundleIdPrefix: com.eduardcramaroc
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    DEVELOPMENT_TEAM: ""
configs:
  Debug: debug
  Release: release
targets:
  LotoReport:
    type: application
    platform: iOS
    info:
      path: ios/LotoReport/Support/Info.plist
      properties:
        CFBundleDisplayName: Loto Report
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UIApplicationSupportsIndirectInputEvents: true
    sources:
      - path: ios/LotoNetTracker
      - path: ios/Shared
        excludes:
          - Resources
      - path: ios/LotoReport/Assets.xcassets
      - path: ios/LotoReport/Preview Content/Preview Assets.xcassets
    resources:
      - ios/Shared/Resources/BootstrapReport.json
      - ios/Shared/Resources/background.png
    dependencies:
      - target: LotoReportWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lotoreport.widgetbuild
        PRODUCT_NAME: LotoReport
        INFOPLIST_KEY_CFBundleDisplayName: "Loto Report"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  LotoReportWidget:
    type: app-extension
    platform: iOS
    info:
      path: ios/LotoReportWidget/Support/Info.plist
      properties:
        CFBundleDisplayName: Loto Report Widget
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    sources:
      - path: ios/LotoNetWidget
      - path: ios/Shared
        excludes:
          - Resources
    resources:
      - ios/Shared/Resources/BootstrapReport.json
      - ios/Shared/Resources/background.png
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lotoreport.widgetbuild.widget
        PRODUCT_NAME: LotoReportWidget
        INFOPLIST_KEY_CFBundleDisplayName: "Loto Report Widget"
        CODE_SIGN_STYLE: Automatic
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Loto Report:
    build:
      targets:
        LotoReport: all
    run:
      config: Debug
    archive:
      config: Release
